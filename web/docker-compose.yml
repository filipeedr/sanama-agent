services:
  web:
    image: ghcr.io/filipeedr/sanama-agent:latest
    container_name: sanama-agent
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-documents}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL_CHAT=${OPENAI_MODEL_CHAT:-gpt-4.1-mini}
      - OPENAI_MODEL_EMBEDDING=${OPENAI_MODEL_EMBEDDING:-text-embedding-3-small}
      - EMBEDDING_VECTOR_SIZE=${EMBEDDING_VECTOR_SIZE:-1536}
      - CHAT_MAX_OUTPUT_TOKENS=${CHAT_MAX_OUTPUT_TOKENS:-2200}
      - SUMMARY_MAX_OUTPUT_TOKENS=${SUMMARY_MAX_OUTPUT_TOKENS:-800}
      - RAG_MATCH_COUNT=${RAG_MATCH_COUNT:-12}
      - ENABLE_OCR_CORRECTION=${ENABLE_OCR_CORRECTION:-true}
      - OCR_CORRECTION_MAX_TOKENS=${OCR_CORRECTION_MAX_TOKENS:-6000}
      - OCR_CORRECTION_BATCH_SIZE=${OCR_CORRECTION_BATCH_SIZE:-3}
      - ENABLE_STRUCTURED_BLOCK_ENRICHMENT=${ENABLE_STRUCTURED_BLOCK_ENRICHMENT:-true}
      - STRUCTURED_BLOCK_MAX_TOKENS=${STRUCTURED_BLOCK_MAX_TOKENS:-1800}
      - STRUCTURED_BLOCK_CONCURRENCY=${STRUCTURED_BLOCK_CONCURRENCY:-2}
