name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no -o ProxyCommand="cloudflared access ssh --hostname ssh.edelmarques.com.br --id $CF_ACCESS_CLIENT_ID --secret $CF_ACCESS_CLIENT_SECRET" edelserver@ssh.edelmarques.com.br << 'EOF'
            cd ~/sanama-agent
            git pull origin main
            docker build -t sanama-agent -f web/Dockerfile web/
            docker stop sanama-agent
            docker rm sanama-agent
            docker run -d --name sanama-agent -p 3001:3000 sanama-agent
          EOF
