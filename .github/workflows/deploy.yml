name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/sanama-agent
            git pull origin main
            docker build -t sanama-agent -f web/Dockerfile web/
            docker stop sanama-agent
            docker rm sanama-agent
            docker run -d --name sanama-agent -p 3001:3000 sanama-agent
